<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaDrone - Login</title>
  <link rel="stylesheet" href="/landing.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top right, #2a2f45 0%, var(--bg-dark) 60%);
    }
    .auth-box {
      background: var(--bg-card);
      padding: 3rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    .auth-title {
      font-size: 2rem;
      margin-bottom: 2rem;
      text-align: center;
      font-weight: 800;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-dim);
    }
    .form-group input {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: var(--font-main);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .auth-btn {
      width: 100%;
      padding: 1rem;
      background: var(--gradient);
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
    }
    .switch-auth {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-dim);
    }
    .switch-auth a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2 class="auth-title">Welcome Back</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="auth-btn">Login</button>
      </form>
      <p class="switch-auth">New here? <a href="#" id="switch-to-signup">Create account</a></p>
    </div>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>
