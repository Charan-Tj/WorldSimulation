<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaDrone - Admin Dashboard</title>
  <link rel="stylesheet" href="/src/styles/landing.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--bg-card);
      padding: 2rem;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .nav-item {
      padding: 1rem;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }
    .nav-item.active, .nav-item:hover {
      background: rgba(252, 128, 25, 0.1);
      color: var(--primary);
    }
    .content {
      padding: 2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-val { font-size: 2rem; font-weight: 800; color: white; }
    .stat-label { color: var(--text-dim); }
    
    .section { display: none; }
    .section.active { display: block; }

    /* Forms */
    .admin-form input, .admin-form select {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 8px;
    }
    .admin-btn {
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="logo" style="margin-bottom: 2rem;">Admin<span class="highlight">Panel</span></div>
      <div class="nav-item active" onclick="showSection('dashboard')">Dashboard</div>
      <div class="nav-item" onclick="showSection('products')">Products</div>
      <div class="nav-item" onclick="showSection('orders')">Orders</div>
    </aside>

    <main class="content">
      <!-- Dashboard Section -->
      <div id="dashboard" class="section active">
        <h2>Overview</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val" id="total-orders">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="total-revenue">₹0</div>
            <div class="stat-label">Revenue</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">5</div>
            <div class="stat-label">Active Drones</div>
          </div>
        </div>
        <div style="height: 300px; background: var(--bg-card); padding: 1rem; border-radius: 16px;">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>

      <!-- Products Section -->
      <div id="products" class="section">
        <h2>Manage Products</h2>
        <div class="stat-card" style="margin-bottom: 2rem;">
          <h3>Add New Product</h3>
          <form id="add-product-form" class="admin-form">
            <input type="text" id="p-name" placeholder="Product Name" required>
            <input type="number" id="p-price" placeholder="Price" required>
            <input type="text" id="p-category" placeholder="Category" required>
            <input type="text" id="p-image" placeholder="Image URL">
            <button type="submit" class="admin-btn">Add Product</button>
          </form>
        </div>
        <div id="product-list"></div>
      </div>
      
      <!-- Orders Section -->
      <div id="orders" class="section">
        <h2>Recent Orders</h2>
        <div id="order-list"></div>
      </div>
    </main>
  </div>
  <script type="module" src="./admin.js"></script>
</body>
</html>
