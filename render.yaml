services:
  - type: web
    name: instadrone-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MONGO_URI
        sync: false   # you'll paste this in the Render dashboard
      - key: JWT_SECRET
        sync: false   # you'll paste this in the Render dashboard
      - key: PORT
        value: 10000  # Render uses port 10000
